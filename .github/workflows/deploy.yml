name: Deploy to GitHub Pages

on:
  # Enkel de hoofdbranch publiceert naar GitHub Pages. Andere (feature-)branches
  # mogen niet deployen — de github-pages omgeving staat dat ook niet toe — dus
  # we triggeren hier niet meer op 'claude/**' om valse rode kruisjes en een
  # race om de Pages-site te vermijden.
  push:
    branches:
      - main
      - master
      - claude/arei-diagram-editor-luXIf
  workflow_dispatch:

# Grant the workflow write access to Pages deployments and an OIDC token so the
# deploy-pages action can authenticate.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy in flight at a time; skip stale ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (GitHub Pages)
        env:
          DEPLOY_TARGET: gh-pages
        run: npm run build

      - name: Ensure SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Configure Pages (and auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
