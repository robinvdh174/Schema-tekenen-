name: Deploy (uitgeschakeld op deze branch)

# Deze branch publiceert NIET langer naar GitHub Pages.
#
# De live-site (robinvdh174.github.io) wordt uitsluitend gepubliceerd vanaf de
# branch 'claude/symbol-corrections-review-rn81ep'. Vroeger triggerde elke
# claude/**-branch een deploy naar dezelfde site, waardoor een oudere versie de
# nieuwste kon overschrijven. Daarom is de deploy hier uitgeschakeld: er is geen
# push-trigger meer en de job kan niet publiceren.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  uitgeschakeld:
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "Deploy is uitgeschakeld op deze branch."
