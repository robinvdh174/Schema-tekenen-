name: Deploy to GitHub Pages

# Slechts ÉÉN branch mag de live-site publiceren. Vroeger triggerde elke
# 'claude/**'-branch deze deploy naar dezelfde GitHub Pages-site, waardoor een
# oudere branch de nieuwste versie kon overschrijven. Door de trigger te
# beperken tot deze ene publicatie-branch kan dat niet meer gebeuren.
on:
  push:
    branches:
      - claude/symbol-corrections-review-rn81ep
  workflow_dispatch:

# Grant the workflow write access to Pages deployments and an OIDC token so the
# deploy-pages action can authenticate.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy in flight at a time; skip stale ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (GitHub Pages)
        env:
          DEPLOY_TARGET: gh-pages
        run: npm run build

      - name: Ensure SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Configure Pages (and auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Geen `environment:`-declaratie: de branch-policy van de github-pages
  # omgeving laat alleen de oorspronkelijke branch toe en zou deploys vanaf
  # andere claude/**-branches blokkeren. De protection rules gelden enkel
  # voor jobs die de omgeving expliciet declareren.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Extra slot: publiceer enkel vanaf de aangewezen publicatie-branch, ook als
    # de workflow ooit handmatig vanaf een andere ref wordt gestart.
    if: github.ref == 'refs/heads/claude/symbol-corrections-review-rn81ep'
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
